  anexos: true
  glosario: true
  referencias: false

metadatos:
  paleta: "sandra-teal"
  fuentes:
    principal: "Inter"
    codigo: "FiraCode"
  iconos: true
  logo: "../../assets/logos/sandra.png"

build:
  motor: "xelatex"
  opciones:
    - "-interaction=nonstopmode"
    - "-shell-escape"
  salida: "SSSIFANB - Manual de Usuario.pdf"

informacion:
  institucion: "Instituto de Previsión Social de la Fuerza Armada Nacional Bolivariana"
  siglas: "IPSFANB"
