manual:
  nombre: "SSSIFANB - Sistema de Seguridad Social de la Fuerza Armada Nacional Bolivariana"
  version: "1.0.0"
  autor: "Carlos Peña"
  fecha: "2026-03-18"
  entorno: "sandra_ecosystem"

estructura:
  portada: true
  preliminares:
    - presentacion
    - glosario
  capitulos:
    - introduccion
    - inicio-sesion
    - afiliacion
    - tarjeta-tim
    - prestaciones
    - nomina-pensionados
