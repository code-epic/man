# Configuración del Manual
# Sandra Ecosystem - Plataforma Empresarial de Middleware

manual:
  nombre: "Sandra Ecosystem"
  version: "1.0.0"
  autor: "Carlos Peña"
  fecha: "2026-03-05"
  descripcion: "Plataforma Empresarial de Middleware"
  entorno: "sandra_ecosystem"

estructura:
  portada: true
  preliminares:
    - dedicatoria
    - prologo
    - presentacion
    - agradecimientos
    - resumen
  capitulos:
    - introduccion
    - marco_teorico
    - marco_legal
    - arquitectura
    - sandra_server
    - consola
    - sdc
    - sentinel
    - seguridad
    - conclusiones
  anexos: true
  glosario: false
  referencias: true

metadatos:
  paleta: "dark-professional"
  fuentes:
    principal: "Inter"
    codigo: "FiraCode"
  iconos: false
  logo: "assets/sandra.png"

build:
  motor: "xelatex"
  opciones:
    - "-interaction=nonstopmode"
  salida: "main.pdf"
